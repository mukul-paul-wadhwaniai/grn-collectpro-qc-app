<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Grain Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center">
    <div class="w-[95%] max-w-[95%] mx-auto flex justify-center px-2">
    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full border border-gray-100">
        <div class="text-center mb-6">
            <span class="text-4xl">🌾</span>
            <h1 class="text-xl font-bold text-gray-900 mt-2">Grain Review Access</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in with your team credentials</p>
        </div>

        {% if error %}
        <div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4 text-center border border-red-100">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                       placeholder="e.g. ml, programmes, product">
            </div>
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2 rounded-lg hover:bg-indigo-700 transition">
                Sign In
            </button>
        </form>
    </div>
    </div>
</body>
</html>
