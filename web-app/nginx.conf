worker_processes auto;
pid logs/nginx.pid;
error_log logs/error.log;

events {
    worker_connections 64;
}

http {
    include       /home/ketan_dhanuka_wadhwaniai_org/miniconda3/envs/gaa/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    access_log    logs/access.log;

    client_body_temp_path temp/client_body;
    proxy_temp_path       temp/proxy;
    fastcgi_temp_path     temp/fastcgi;
    uwsgi_temp_path       temp/uwsgi;
    scgi_temp_path        temp/scgi;

    server {
        listen 7866;
        client_max_body_size 20M;

        location /static/images/ {
            alias /home/ketan_dhanuka_wadhwaniai_org/code/food-grain-analyser-ml/misc_activities/wiai_round_3_collection/static/images/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
    }
}
